{% extends 'layouts/default-layout.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/myroom_list.css' %}">

<div class="myroom-list-body">

    <div class="myroom-list-title">
        <span class="myroom">MY ROOM</span>
        <span class="myroom-num">({{ rooms|length }})</span>
    </div>

    <div class="myroom-list">
        {% for room in rooms %}
            <a href="{% url 'myroom_detail' room.id %}" class="myroom-item">
                <div class="myroom-title">{{ room.title }}</div>
                <div class="mymember-stack">
                    {% for member in room.member_profiles %}
                        <div class="mymember">
                            <img src="{{ member.avatar }}"
                                 alt="{{ member.nickname }}"
                                 class="member-avatar {{ member.color }}">
                            <span class="member-nick">{{ member.nickname }}</span>
                        </div>
                    {% endfor %}
                </div>
            </a>
            {% empty %}
            <div class="myroom-empty">
                <p>아직 속한 방이 없습니다.</p>
            </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
